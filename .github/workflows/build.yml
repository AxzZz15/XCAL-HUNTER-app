name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Download & Set Icon
        run: |
          sudo apt-get install -y imagemagick
          curl -L "https://files.catbox.moe/w0l6qy.jpg" -o icon_raw.jpg
          for size in 48 72 96 144 192; do
            case $size in
              48)  folder="mipmap-mdpi" ;;
              72)  folder="mipmap-hdpi" ;;
              96)  folder="mipmap-xhdpi" ;;
              144) folder="mipmap-xxhdpi" ;;
              192) folder="mipmap-xxxhdpi" ;;
            esac
            convert icon_raw.jpg -resize ${size}x${size} android/app/src/main/res/${folder}/ic_launcher.png
            convert icon_raw.jpg -resize ${size}x${size} android/app/src/main/res/${folder}/ic_launcher_round.png
          done

      - name: Patch MainActivity native feel
        run: |
          cat > android/app/src/main/java/com/xcalhunter/app/MainActivity.java << 'JAVA'
          package com.xcalhunter.app;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              getWindow().setFlags(
                WindowManager.LayoutParams.FLAG_FULLSCREEN,
                WindowManager.LayoutParams.FLAG_FULLSCREEN
              );
              getWindow().getDecorView().setSystemUiVisibility(
                View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                View.SYSTEM_UI_FLAG_FULLSCREEN |
                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
              );
            }
          }
          JAVA

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCAL-HUNTER-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
